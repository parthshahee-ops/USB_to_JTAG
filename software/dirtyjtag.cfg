# ====================================================================
# OpenOCD DirtyJTAG -> SPI Loopback Verification
# ====================================================================

# 1. Hardware Interface Config
adapter driver dirtyjtag

# --- ADD THIS LINE TO FIX THE SPEED ERROR ---
adapter speed 1000  
# This sets the JTAG clock to 1000 kHz (1 MHz).
# It will also cause OpenOCD to send a 0xF3 (TYPE_SPEED) packet to your MCU!
# --------------------------------------------

transport select jtag

# 2. Dummy Target Configuration
# We MUST set expected-id to 0 so OpenOCD doesn't abort when checking 
# for a real silicon ID code on our loopback wire.
jtag newtap dummy cpu -irlen 4 -expected-id 0

# 3. Initialization
init

echo "\n========================================================"
echo "=== RUNNING ALTERNATING BIT VERIFICATION VIA DIRTYJTAG ==="
echo "========================================================\n"

# 4. The Payload Transfer
# This runs a 64-bit scan to stream the 0xAAAAAAAAAAAAAAAA pattern 
# down your transparent MCU-to-FPGA bridge pipeline.
drscan dummy.cpu 64 0xAAAAAAAAAAAAAAAA

echo "\n=== TRANSFER COMPLETE ==="
shutdown