adapter driver remote_bitbang
remote_bitbang host 127.0.0.1
remote_bitbang port 7777

# Set standard dummy target parameters
jtag newtap dummy cpu -irlen 4 -ircapture 0x0 -irmask 0x0 -expected-id 0x12345678

init
echo "=== RUNNING ALTERNATING BIT VERIFICATION === "

# Use standard jtag pathmove namespaces 
# Route: Move from RUN/IDLE through DRSELECT, DRCAPTURE, straight into DRSHIFT
jtag pathmove RUN/IDLE DRSELECT DRCAPTURE DRSHIFT

# Blindly shift 64 bits of alternating 1s and 0s down the wire
drscan dummy.cpu 64 0xAAAAAAAAAAAAAAAA
exit